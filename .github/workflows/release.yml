name: Publish Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: release-main
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Tag and publish
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Validate release version
        run: ./scripts/check-version.sh

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          if git rev-parse "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tag_exists=false" >> "${GITHUB_OUTPUT}"
          fi
          if gh release view "v${version}" >/dev/null 2>&1; then
            echo "release_exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "release_exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve curated release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/face-manager-release-notes.md
        run: >-
          python3 scripts/changelog.py notes
          --version "${VERSION}"
          --output "${RELEASE_NOTES_PATH}"

      - name: Create annotated tag
        if: steps.version.outputs.tag_exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Face Manager v${VERSION}" "${RELEASE_SHA}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/face-manager-release-notes.md
        run: |
          gh release create "v${VERSION}" \
            --title "Face Manager v${VERSION}" \
            --notes-file "${RELEASE_NOTES_PATH}" \
            --target "${RELEASE_SHA}"

      - name: Sync existing GitHub Release notes
        if: steps.version.outputs.release_exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/face-manager-release-notes.md
        run: |
          gh release edit "v${VERSION}" \
            --title "Face Manager v${VERSION}" \
            --notes-file "${RELEASE_NOTES_PATH}"

  windows-installer:
    name: Build Windows installer (${{ matrix.variant }})
    if: github.event.workflow_run.conclusion == 'success'
    needs:
      - release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - cpu
          - gpu
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
      VERSION: ${{ needs.release.outputs.version }}
      INSTALLER_SUFFIX: ${{ matrix.variant == 'gpu' && '-GPU' || '' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-desktop.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows release bundle
        shell: pwsh
        run: ./packaging/windows/build-release.ps1 -Variant ${{ matrix.variant }}

      - name: Attest Windows installer provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@v4
        with:
          subject-path: dist/FaceManager-Setup${{ env.INSTALLER_SUFFIX }}-${{ env.VERSION }}.exe

      - name: Upload installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "v$env:VERSION" `
            "dist/FaceManager-Setup$env:INSTALLER_SUFFIX-$env:VERSION.exe" `
            "dist/FaceManager-Setup$env:INSTALLER_SUFFIX-$env:VERSION.exe.sha256" `
            --clobber
