<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a20"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="470" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="person" x1="512" y1="320" x2="512" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eafcff"/>
      <stop offset="1" stop-color="#b9f2ff"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#glow)"/>
  <!-- subtle inner hairline -->
  <rect x="6" y="6" width="1012" height="1012" rx="215" ry="215" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <g clip-path="url(#round)">
    <!-- Person silhouette: head + shoulders bust -->
    <g fill="url(#person)">
      <circle cx="512" cy="428" r="122"/>
      <path d="M326 726
               C326 632 408 574 512 574
               C616 574 698 632 698 726
               Z"/>
    </g>

    <!-- Detection frame corner brackets -->
    <g fill="none" stroke="#00e5ff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
      <path d="M300 388 L300 300 L388 300"/>
      <path d="M636 300 L724 300 L724 388"/>
      <path d="M724 636 L724 724 L636 724"/>
      <path d="M388 724 L300 724 L300 636"/>
    </g>
  </g>
</svg>
